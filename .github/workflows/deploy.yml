name: Deploy Wordpress Application To EKS Cluster

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "infrastructure/**"
      - "gitops/**"
      - "app/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - "infrastructure/**"
      - "gitops/**"
      - "app/**"
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region to deploy to"
        required: false
        type: string
        default: "us-east-1"
      eks_cluster_name:
        description: "EKS cluster name"
        required: false
        type: string
        default: "wordpress-eks"
      aws_role_to_assume:
        description: "IAM role ARN for GitHub OIDC (optional if set in repo variable)"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ github.event.inputs.aws_region || vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ github.event.inputs.eks_cluster_name || vars.EKS_CLUSTER_NAME || 'wordpress-eks' }}
  AWS_ROLE_TO_ASSUME: ${{ github.event.inputs.aws_role_to_assume || secrets.AWS_ROLE_TO_ASSUME || '' }}
  WORDPRESS_NAMESPACE: ${{ vars.WORDPRESS_NAMESPACE || 'wordpress' }}
  WORDPRESS_RELEASE_NAME: ${{ vars.WORDPRESS_RELEASE_NAME || 'wordpress' }}
jobs:
  terraform-plan:
    name: Terraform Plan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate AWS role input
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "Missing AWS role ARN. Provide one of:"
            echo "1) workflow_dispatch input: aws_role_to_assume"
            echo "2) repository variable: AWS_ROLE_TO_ASSUME"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-terraform-plan
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform -chdir=infrastructure init -input=false

      - name: Terraform Validate
        run: terraform -chdir=infrastructure validate

      - name: Terraform Plan
        run: terraform -chdir=infrastructure plan -input=false -out=tfplan

  deploy:
    name: Deploy Infrastructure And Workload
    if: github.event_name == 'push' || github.base_ref== 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: terraform-plan

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate AWS role input
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ]; then
            echo "Missing AWS role ARN. Provide one of:"
            echo "1) workflow_dispatch input: aws_role_to_assume"
            echo "2) repository variable: AWS_ROLE_TO_ASSUME"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Init
        run: terraform -chdir=infrastructure init -input=false

      - name: Terraform Apply
        run: terraform -chdir=infrastructure apply -input=false -auto-approve

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Create namespace
        run: kubectl create namespace "$WORDPRESS_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create EFS StorageClass
        run: |
          EFS_FILE_SYSTEM_ID="$(terraform -chdir=infrastructure output -raw efs_file_system_id)"

          if [ -z "$EFS_FILE_SYSTEM_ID" ]; then
            echo "Missing EFS filesystem ID from Terraform output."
            exit 1
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: wordpress-efs
          provisioner: efs.csi.aws.com
          parameters:
            provisioningMode: efs-ap
            fileSystemId: ${EFS_FILE_SYSTEM_ID}
            directoryPerms: "700"
            basePath: "/wordpress"
          reclaimPolicy: Retain
          volumeBindingMode: Immediate
          allowVolumeExpansion: true
          EOF

      - name: Wait for EFS CSI driver
        run: |
          kubectl -n kube-system rollout status deployment/efs-csi-controller --timeout=10m
          kubectl -n kube-system rollout status daemonset/efs-csi-node --timeout=10m

      - name: Deploy WordPress manifest if present
        run: |
          if [ -s gitops/app.yml ]; then
            kubectl apply -f gitops/app.yml
            exit 0
          fi

          echo "gitops/app.yml is empty. Deploying WordPress with Helm instead."
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update

          deploy_wordpress() {
            helm upgrade --install "$WORDPRESS_RELEASE_NAME" bitnami/wordpress \
              --namespace "$WORDPRESS_NAMESPACE" \
              --wait \
              --timeout 15m \
              --set service.type=LoadBalancer \
              --set service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-scheme"=internet-facing \
              --set service.annotations."service\.beta\.kubernetes\.io/aws-load-balancer-type"=nlb \
              --set persistence.enabled=true \
              --set persistence.storageClass=wordpress-efs \
              --set persistence.accessModes[0]=ReadWriteMany \
              --set mariadb.primary.persistence.enabled=true \
              --set mariadb.primary.persistence.storageClass=wordpress-efs \
              --set mariadb.primary.persistence.accessModes[0]=ReadWriteMany \
              --set wordpressUsername="${{ secrets.WORDPRESS_ADMIN_USER }}" \
              --set wordpressPassword="${{ secrets.WORDPRESS_ADMIN_PASSWORD }}" \
              --set wordpressEmail="${{ secrets.WORDPRESS_ADMIN_EMAIL }}" \
              --set wordpressBlogName="${{ vars.WORDPRESS_BLOG_NAME || 'WordPress on EKS' }}"
          }

          set +e
          DEPLOY_OUTPUT="$(deploy_wordpress 2>&1)"
          DEPLOY_EXIT=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          if [ $DEPLOY_EXIT -eq 0 ]; then
            exit 0
          fi

          if echo "$DEPLOY_OUTPUT" | grep -qi "spec is immutable"; then
            echo "Immutable Kubernetes storage fields detected. Recreating WordPress release."
            helm uninstall "$WORDPRESS_RELEASE_NAME" --namespace "$WORDPRESS_NAMESPACE" || true
            kubectl delete pvc "$WORDPRESS_RELEASE_NAME" --namespace "$WORDPRESS_NAMESPACE" --ignore-not-found=true
            kubectl delete pvc "data-${WORDPRESS_RELEASE_NAME}-mariadb-0" --namespace "$WORDPRESS_NAMESPACE" --ignore-not-found=true
            deploy_wordpress
            exit 0
          fi

          exit $DEPLOY_EXIT
